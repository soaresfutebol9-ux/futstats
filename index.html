<!-- ═══════════════════════════════════════════════════════════ -->
<script>
// ══════════════════════════════════════════════════════════════
//  FUTSTATS — SISTEMA DE TEMPORADAS
//  Temporada = ano completo (Jan–Dez), encerra automaticamente
//  em 31/dez. Campeão = maior soma de Gols + Assistências no ano.
// ══════════════════════════════════════════════════════════════

/* ── Helpers ────────────────────────────────────────────────── */

/** Retorna o ano de uma temporada como string, ex: "2025" */
function _tempKey(ano) { return String(ano); }

/** Retorna quantos dias restam até 31/dez do ano atual */
function _diasParaFimTemporada() {
  const hoje = new Date();
  const fimAno = new Date(hoje.getFullYear(), 11, 31); // 31 dez
  const diff = fimAno - hoje;
  return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
}

/** Retorna todas as partidas do grupo em um dado ano (de matches + historico) */
function _partidasDoAno(gd, ano) {
  if (!gd) return [];
  const anoStr = String(ano);
  const todasPartidas = [];

  // Partidas ativas (mes atual e meses do ano em gd.matches)
  (gd.matches || []).forEach(m => {
    const mesKey = m.mesKey || m.date?.substring(0, 7); // "YYYY-MM"
    if (mesKey && mesKey.startsWith(anoStr)) todasPartidas.push(m);
  });

  // Historico: cada entrada é { matches: [...], members: [...] }
  Object.entries(gd.historico || {}).forEach(([key, h]) => {
    if (key.startsWith(anoStr)) {
      (h.matches || []).forEach(m => todasPartidas.push(m));
    }
  });

  return todasPartidas;
}

/**
 * Calcula o ranking de temporada de um ano.
 * Retorna array ordenado: [{ uid, name, gols, assist, ga }, ...]
 */
function _calcRankingTemporada(gd, ano) {
  if (!gd) return [];
  const partidas = _partidasDoAno(gd, ano);
  const map = {}; // uid → { uid, name, gols, assist }

  // Inclui todos os membros atuais
  (gd.members || []).forEach(m => {
    if (!map[m.uid]) map[m.uid] = { uid: m.uid, name: m.name, gols: 0, assist: 0 };
  });

  // Soma as partidas do ano
  partidas.forEach(p => {
    const uid = p.uid;
    if (!uid) return;
    if (!map[uid]) {
      // Jogador que saiu do grupo mas jogou no ano
      map[uid] = { uid, name: p.player || p.name || 'Jogador', gols: 0, assist: 0 };
    }
    map[uid].gols  += (p.gols   || 0);
    map[uid].assist += (p.assist || 0);
  });

  return Object.values(map)
    .map(p => ({ ...p, ga: p.gols + p.assist }))
    .sort((a, b) => b.ga - a.ga || b.gols - a.gols);
}

/**
 * Retorna o campeão de um ano a partir do ranking.
 * Retorna null se não houver dados.
 */
function _campeoTemporada(gd, ano) {
  const rank = _calcRankingTemporada(gd, ano);
  if (!rank.length || rank[0].ga === 0) return null;
  // Empate: retorna null (sem campeão definido)
  if (rank.length >= 2 && rank[0].ga === rank[1].ga) return null;
  return rank[0];
}

/**
 * Retorna a estrutura de temporadas salvas no gd (gd.temporadas).
 * Estrutura: { "2025": { campeaoUid, campeaoNome, ga, gols, assist, podium: [...] } }
 */
function _getTemporadasSalvas(gd) {
  return gd?.temporadas || {};
}

/* ── Encerramento automático (chamado ao carregar o grupo) ─── */

/**
 * Verifica se o ano anterior não tem temporada salva e salva automaticamente.
 * Deve ser chamado após carregar o gd (no mesmo lugar que renderRanking()).
 * Retorna true se uma nova temporada foi encerrada.
 */
async function _verificarEncerramentoTemporada(db, groupId, gd) {
  if (!gd || !groupId || !db) return false;
  const anoAtual = new Date().getFullYear();
  const anoAnterior = anoAtual - 1;

  // Só encerra o ano anterior se ainda não foi salvo
  const salvas = _getTemporadasSalvas(gd);
  if (salvas[String(anoAnterior)]) return false; // já salvo

  // Verifica se há partidas no ano anterior
  const rank = _calcRankingTemporada(gd, anoAnterior);
  if (!rank.length || rank[0].ga === 0) return false; // sem dados

  // Monta registro da temporada
  const podium = rank.slice(0, 3).map(p => ({ uid: p.uid, name: p.name, gols: p.gols, assist: p.assist, ga: p.ga }));
  const campeao = rank[0].ga > (rank[1]?.ga || 0) ? rank[0] : null; // sem campeão em empate

  const tempData = {
    ano: anoAnterior,
    encerradaEm: Date.now(),
    podium,
    campeaoUid:   campeao?.uid  || null,
    campeaoNome:  campeao?.name || null,
    campeaoGa:    campeao?.ga   || 0,
    campeaoGols:  campeao?.gols || 0,
    campeaoAssist:campeao?.assist || 0,
  };

  // Salva no Firestore (campo gd.temporadas)
  try {
    const { doc, getDoc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap = await getDoc(doc(db, 'groups', groupId));
    const cur  = snap.data();
    if (!cur.temporadas) cur.temporadas = {};
    cur.temporadas[String(anoAnterior)] = tempData;
    await setDoc(doc(db, 'groups', groupId), cur);

    // Atualiza gd local
    if (!gd.temporadas) gd.temporadas = {};
    gd.temporadas[String(anoAnterior)] = tempData;

    return true;
  } catch (e) {
    console.warn('[Temporadas] Erro ao salvar:', e);
    return false;
  }
}

/* ── Banner da temporada ativa no ranking ─────────────────── */

/**
 * Gera o HTML do banner de temporada ativa para o topo do ranking.
 * Chame dentro de renderRanking() ou cole o resultado no início do #rl.
 */
function _renderBannerTemporada(gd) {
  const ano = new Date().getFullYear();
  const dias = _diasParaFimTemporada();
  const rank = _calcRankingTemporada(gd, ano);
  const lider = rank[0];

  let liderHTML = '';
  if (lider && lider.ga > 0) {
    const empate = rank.length >= 2 && rank[0].ga === rank[1].ga;
    if (empate) {
      liderHTML = `<div class="temp-active-countdown">🤝 Empate no topo — ${rank[0].name} & ${rank[1].name}</div>`;
    } else {
      liderHTML = `<div class="temp-active-countdown">🥇 Liderando: <strong>${lider.name}</strong> · ${lider.ga} G+A</div>`;
    }
  } else {
    liderHTML = `<div class="temp-active-countdown">Nenhuma partida ainda em ${ano}</div>`;
  }

  return `
    <div class="temp-active-banner" onclick="abrirTemporadas()">
      <div class="temp-active-icon">🏆</div>
      <div class="temp-active-info">
        <div class="temp-active-label">Temporada ${ano}</div>
        <div class="temp-active-title">Jan–Dez ${ano}</div>
        ${liderHTML}
      </div>
      <div class="temp-days-pill">${dias}d</div>
    </div>
  `;
}

/* ── Seção de Temporadas no Histórico ─────────────────────── */

/**
 * Gera o HTML da seção de temporadas passadas para a aba Histórico.
 * Cole o resultado dentro da função renderHistTab(), no início ou fim.
 */
function _renderSecaoTemporadas(gd) {
  const salvas = _getTemporadasSalvas(gd);
  const anos = Object.keys(salvas).sort((a, b) => b - a); // mais recente primeiro

  if (!anos.length) return '';

  const cards = anos.map(ano => {
    const t = salvas[ano];
    const podiumItems = (t.podium || []).map((p, i) => {
      const medalhas = ['🥇', '🥈', '🥉'];
      const cls = ['gold', 'silver', 'bronze'][i] || '';
      return `
        <div class="temp-podium-item ${cls}">
          <span class="temp-podium-pos">${medalhas[i] || (i + 1)}</span>
          <div>
            <div class="temp-podium-name">${p.name}</div>
            <div class="temp-podium-ga">${p.ga} G+A</div>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="temp-card" onclick="abrirTemporadaDetalhes('${ano}')">
        <div class="temp-card-header">
          <span class="temp-card-icon">🏆</span>
          <div>
            <div class="temp-card-title">Temporada ${ano}</div>
            <div class="temp-card-subtitle">
              ${t.campeaoNome ? `Campeão: ${t.campeaoNome}` : 'Sem campeão (empate)'}
            </div>
          </div>
        </div>
        <div class="temp-card-podium">${podiumItems}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="temp-section-header">
      <span style="font-size:18px">🏆</span>
      <span class="temp-section-title">Temporadas</span>
      <span class="temp-section-badge">${anos.length} encerrada${anos.length > 1 ? 's' : ''}</span>
    </div>
    ${cards}
  `;
}

/* ── Troféus no perfil do jogador ─────────────────────────── */

/**
 * Gera o HTML dos troféus de temporada para o perfil de um uid.
 * Cole dentro de openPlayerProfile() ou renderPanPerfil().
 */
function _renderTrofeusTemporada(gd, uid) {
  const salvas = _getTemporadasSalvas(gd);
  const anos = Object.keys(salvas).sort((a, b) => a - b);
  const conquistas = anos.filter(ano => salvas[ano].campeaoUid === uid);

  if (!conquistas.length) {
    return `
      <div class="temp-trophies-section">
        <div class="temp-trophies-label">🏆 Títulos de Temporada</div>
        <div class="temp-no-trophies">Nenhum título ainda</div>
      </div>
    `;
  }

  const pills = conquistas.map(ano =>
    `<span class="temp-trophy-pill">🏆 T${ano}</span>`
  ).join('');

  return `
    <div class="temp-trophies-section">
      <div class="temp-trophies-label">🏆 Títulos de Temporada</div>
      <div class="temp-trophies-list">${pills}</div>
    </div>
  `;
}

/**
 * Retorna badge(s) de temporada para exibir ao lado do nome no ranking.
 * Ex: "🏆 T2024" se o jogador ganhou T2024.
 */
function _badgesTemporadaRanking(gd, uid) {
  const salvas = _getTemporadasSalvas(gd);
  const titles = Object.keys(salvas)
    .filter(ano => salvas[ano].campeaoUid === uid)
    .sort((a, b) => b - a)
    .slice(0, 2); // mostra até 2 badges

  return titles.map(ano =>
    `<span class="temp-champ-mini">🏆 T${ano}</span>`
  ).join('');
}

/* ── Modal de detalhes / cerimônia ────────────────────────── */

/** Abre o modal de cerimônia de encerramento de temporada para um ano específico */
function abrirTemporadaDetalhes(ano) {
  const gd = window._gd;
  if (!gd) return;

  const salvas = _getTemporadasSalvas(gd);
  const t = salvas[String(ano)];
  if (!t) return;

  // Preenche header
  document.getElementById('temp-modal-season').textContent = `TEMPORADA ${ano}`;
  document.getElementById('temp-modal-winner-name').textContent = t.campeaoNome || 'Empate';
  document.getElementById('temp-modal-winner-ga').textContent = t.campeaoGa ? `${t.campeaoGa} G+A · ${t.campeaoGols}G ${t.campeaoAssist}A` : '—';
  document.getElementById('temp-modal-badge').textContent = `🏆 Campeão T${ano}`;
  document.getElementById('temp-modal-badge').style.display = t.campeaoUid ? 'inline-flex' : 'none';

  // Preenche podium
  const medalhas = ['🥇', '🥈', '🥉'];
  const podiumHTML = (t.podium || []).map((p, i) => `
    <div class="temp-modal-podium-item">
      <div class="temp-modal-pos">${medalhas[i] || (i+1)}</div>
      <div class="temp-modal-player-info">
        <div class="temp-modal-player-name">${p.name}</div>
        <div class="temp-modal-player-stats">${p.gols}G · ${p.assist}A</div>
      </div>
      <div class="temp-modal-player-ga">${p.ga} <span>G+A</span></div>
    </div>
  `).join('');
  document.getElementById('temp-modal-podium').innerHTML = podiumHTML;

  // Confetti
  _spawnConfetti();

  document.getElementById('modal-temporada').classList.add('open');
}

/** Abre a tela de temporadas (vai para aba histórico ou mostra a mais recente) */
function abrirTemporadas() {
  const gd = window._gd;
  if (!gd) return;
  const salvas = _getTemporadasSalvas(gd);
  const anos = Object.keys(salvas).sort((a, b) => b - a);

  if (anos.length > 0) {
    // Abre detalhes da temporada mais recente encerrada
    abrirTemporadaDetalhes(anos[0]);
  } else {
    // Apenas mostra uma notificação — a temporada ainda está em andamento
    alert(`Temporada ${new Date().getFullYear()} em andamento! Encerra em 31/dez.`);
  }
}

function fecharModalTemporada() {
  document.getElementById('modal-temporada').classList.remove('open');
}

/* ── Confetti ────────────────────────────────────────────── */
function _spawnConfetti() {
  const wrap = document.getElementById('temp-confetti-wrap');
  if (!wrap) return;
  wrap.innerHTML = '';
  const colors = ['#F2C94C', '#FF5A7A', '#4dffb0', '#fff', '#ffb700', '#a855f7'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'temp-confetti';
    el.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration: ${0.8 + Math.random() * 1.2}s;
      animation-delay: ${Math.random() * 0.5}s;
      width: ${4 + Math.random() * 8}px;
      height: ${4 + Math.random() * 8}px;
    `;
    wrap.appendChild(el);
  }
}

// Expõe funções globalmente
window._calcRankingTemporada = _calcRankingTemporada;
